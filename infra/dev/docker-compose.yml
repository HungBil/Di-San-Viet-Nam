services:
  frontend:
    build: ../../frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
      VITE_FRONTEND_PORT: 5173
    depends_on:
      - backend

  backend:
    build: ../../backend
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      PORT: 3000
      AGENT_BASE_URL: ${AGENT_BASE_URL:-http://agent:8000}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:5173}
    volumes:
      - ../../backend/src/data:/app/src/data
    depends_on:
      - agent

  agent:
    build: ../../agent
    env_file:
      - ../../.env
    ports:
      - "${AGENT_PORT:-8000}:8000"
    environment:
      PORT: 8000
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
