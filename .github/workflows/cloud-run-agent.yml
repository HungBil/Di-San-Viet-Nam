name: Deploy Agent to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - ".github/workflows/cloud-run-agent.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      SERVICE: viet-heritage-agent
    steps:
      - uses: actions/checkout@v4

      - name: Check deploy config
        run: |
          test -n "$GCP_PROJECT_ID"
          test -n "$GCP_REGION"
          test -n "$GAR_REPOSITORY"
          test -n "$GCP_WORKLOAD_IDENTITY_PROVIDER"
          test -n "$GCP_SERVICE_ACCOUNT"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker "$GCP_REGION-docker.pkg.dev" --quiet

      - name: Build and push image
        run: |
          IMAGE="$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$GAR_REPOSITORY/$SERVICE:$GITHUB_SHA"
          docker build -t "$IMAGE" agent
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ vars.GCP_REGION }}
          image: ${{ env.IMAGE }}
